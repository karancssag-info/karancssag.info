{% assign data = site.data.bird %}
<article class="post">
    <div class="birds">

        {% for item in data.data.species %}

        {% assign bird = item.species %}

        <div
                class="bird-card"
                style="background-image: url('{{ bird.imageUrl }}');"
        >

            <div class="bird-overlay"></div>
            {% if item.lastDetection.soundscape.url %}
            <div class="bird-play">
                <a
                        class="icon-btn audio-player-btn"
                        href="{{ item.lastDetection.soundscape.url }}"
                >
                    <i class="fa-solid fa-play"></i>
                </a>
            </div>
            {% endif %}

            <div class="bird-count" title="Észlelések száma">
                {{ item.count }}
            </div>

            <div class="bird-footer">

                <div class="bird-text">
                    <div class="bird-name">
                        {{ bird.commonName }}
                    </div>

                    <div class="bird-latin">
                        {{ bird.scientificName }}
                    </div>

                    <div class="bird-image-credit">
                        Fotó: {{ bird.imageCredit }}
                    </div>

                    <div class="bird-image-license">
                        <a href="{{ bird.imageLicenseUrl }}" target="_blank" >{{ bird.imageLicense }}</a>
                    </div>

                </div>

                <div class="bird-links">

                    <a
                            class="icon-btn"
                            href="{{ bird.wikipediaUrl }}"
                            target="_blank"
                            rel="noopener"
                            aria-label="Wikipédia"
                            title="Wikipédia"
                    >
                        <i class="fa-brands fa-wikipedia-w"></i>
                    </a>

                    <a
                            class="icon-btn"
                            href="{{ bird.birdweatherUrl }}"
                            target="_blank"
                            rel="noopener"
                            aria-label="BirdWeather"
                            title="BirdWeather"
                    >
                        <i class="fa-solid fa-dove"></i>
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            background: #f4f6f8;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-bottom: 24px;
        }

        .birds {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .bird-card {
            position: relative;
            min-height: 360px;
            border-radius: 20px;
            overflow: hidden;

            background-size: cover;
            background-position: center;

            box-shadow: 0 6px 20px rgba(0,0,0,0.18);

            transition:
                    transform .2s ease,
                    box-shadow .2s ease;
        }

        .bird-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.24);
        }

        .bird-overlay {
            position: absolute;
            inset: 0;

            background:
                    linear-gradient(
                            to top,
                            rgba(0,0,0,0.78) 0%,
                            rgba(0,0,0,0.35) 35%,
                            rgba(0,0,0,0.08) 60%,
                            rgba(0,0,0,0.12) 100%
                    );
        }

        .bird-count {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 2;

            min-width: 48px;
            height: 48px;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 0 12px;

            border-radius: 999px;

            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);

            color: #fff;
            font-size: 18px;
            font-weight: bold;

            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .bird-play {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 2;

            min-width: 48px;
            height: 48px;

            display: flex;
            align-items: center;
            justify-content: center;

            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }

        .bird-footer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;

            z-index: 2;

            padding: 18px;

            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
        }

        .bird-text {
            flex: 1;
            min-width: 0;
        }

        .bird-name {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            line-height: 1.15;

            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .bird-latin {
            margin-top: 4px;

            color: rgba(255,255,255,0.58);
            font-size: 16px;
            font-style: italic;

            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .bird-image-credit, .bird-image-credit a {
            color: rgba(255,255,255,0.58);
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
            font-size: 14px;
        }

        .bird-image-license, .bird-image-license a {
            color: rgba(255,255,255,0.58);
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
            font-size: 10px;
            font-style: italic;
        }

        .bird-links {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 46px;
            height: 46px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;

            background: rgba(255,255,255,0.92);
            color: #222;

            text-decoration: none;
            font-size: 20px;

            transition:
                    transform .15s ease,
                    background .15s ease,
                    color .15s ease;
        }

        .icon-btn:hover {
            transform: scale(1.08);
            background: #fff;
            color: #000;
            text-decoration: none;
        }

    </style>
    <script>
        document.querySelectorAll('.audio-player-btn').forEach(button => {
            let audio = null;
            const icon = button.querySelector('i');

            button.addEventListener('click', function (e) {
                e.preventDefault();

                // Ha még nincs létrehozva az Audio objektum
                if (!audio) {
                    audio = new Audio(button.href);

                    // Egyszer játssza le, majd álljon vissza
                    audio.addEventListener('ended', () => {
                        icon.classList.remove('fa-pause');
                        icon.classList.add('fa-play');

                        audio.currentTime = 0;
                    });
                }

                if (audio.paused) {
                    audio.play();

                    icon.classList.remove('fa-play');
                    icon.classList.add('fa-pause');
                } else {
                    audio.pause();
                    audio.currentTime = 0;

                    icon.classList.remove('fa-pause');
                    icon.classList.add('fa-play');
                }
            });
        });
    </script>
</article>
